name: Projeto_Jarvis

channels:
  - pytorch
  - conda-forge
  - defaults

dependencies:
  # --- Versão do Python ---
  - python=3.10

  # --- Pacotes Conda ---
  # PyTorch é melhor instalado pelo seu próprio canal
  - pytorch
  - cpuonly # Adicione esta linha se você NÃO tem uma GPU NVIDIA. Remova se tiver.

  # Dependências de sistema para áudio
  - pyaudio

  # Bibliotecas principais do projeto
  - scikit-learn # Mantemos por enquanto, mas o RAG não usará mais
  - flask
  - requests
  - python-dotenv
  - pytest
  - huggingface-hub

  # --- Pacotes Pip ---
  # Adiciona o pip para instalar pacotes que não estão nos canais principais
  - pip
  - pip:
    - pyttsx3
    - SpeechRecognition
    - sentence-transformers
